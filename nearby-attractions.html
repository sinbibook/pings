<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>거제 핑스 애견펜션</title>
    <meta name="description" content="거제 핑스 애견펜션, 반려견과 함께 즐기는 감성 오션뷰 숙소">
    <meta name="keywords" content="거제펜션,거제숙소,거제애견,거제반려견,애견펜션,반려견동반">
    <!-- Preload critical resources -->
    <link rel="preload" href="styles/common.css" as="style">
    <link rel="preload" href="styles/nearby-attractions.css" as="style">

    <!-- Theme CSS -->
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/common.css">
    <link rel="stylesheet" href="styles/nearby-attractions.css">
  <!-- Open Graph Meta Tags for Social Media -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="거제 핑스 애견펜션" />
  <meta property="og:description" content="아름다운 바다 뷰와 개별 테라스에서의 여유를 즐기는 핑스 애견펜션입니다." />
  <meta property="og:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/05/06/nu845vWsafMU.jpg" />
  <meta property="og:url" content="https://pings.kr" />

  <!-- Twitter Card Meta Tags -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="거제 핑스 애견펜션" />
  <meta name="twitter:description" content="아름다운 바다 뷰와 개별 테라스에서의 여유를 즐기는 핑스 애견펜션입니다." />
  <meta name="twitter:image" content="https://bookingplay-media.s3.amazonaws.com/item_images/2026/05/06/nu845vWsafMU.jpg" />
</head>
<body>

    <section class="page-hero-section">
        <!-- Hero background image -->
        <div class="hero-background">
            <img data-customfield-nearby-attractions-hero-image-0>
        </div>
        <!-- Scroll Down Arrow -->
        <div class="scroll-down-section" onclick="scrollToContent()">
            <span class="scroll-text">Scroll Down</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 10L12 15L17 10" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </section>

    <main class="nearby-attractions-content scroll-target">
        <div class="main-container">

            <!-- Hero content: title and description -->
            <div class="hero-content animate-element">
                <h2 class="hero-title title-with-circle-and-line" data-attractions-title></h2>
                <p class="hero-description" data-nearby-attractions-hero-description></p>
            </div>

            <!-- Attractions grid (dynamically generated) -->
            <div id="attractions-grid" class="animate-element"></div>

        </div>

        <!-- Full banner closing section -->
        <section class="full-banner animate-element" data-main-banner>
            <div class="closing-property-name" data-closing-property-name></div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/image-with-fallback.js"></script>
    <script src="js/common.js"></script>
    <script src="js/image-helpers.js"></script>
    <script src="js/data-mapper/core/base-mapper.js"></script>
    <script src="js/data-mapper/pages/nearby-attractions-mapper.js"></script>
    <script src="js/preview-handler.js"></script>
    <script src="js/data-mapper/pages/header-footer-mapper.js"></script>
    <script src="js/header-footer-loader.js"></script>
    <script src="js/common/scroll-animations.js"></script>
    <script src="js/pages/nearby-attractions.js"></script>

    <!-- Initialize Data Mapper -->
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const nearbyAttractionsMapper = new NearbyAttractionsMapper();
            await nearbyAttractionsMapper.initialize();
        });
    </script>

</body>
</html>
